version: '3.9'
services:
  postgres:
    image: postgres:17.6
    container_name: smart-delivery-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: smart_delivery
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgre -d smart_delivery"]
      interval: 10s
      timeout: 5s
      retries: 5
volumes:
  postgres_data: