spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/smart_delivery
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true

server:
  port: 8080
  servlet:
    context-path: /smart-delivery

logging:
  level:
    root: INFO
    org.springframework.web: DEBUG
    org.flywaydb: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics